name: Build & Push Flutter Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=docker.io/lowjik/fluffychat-building-bundle:latest" >> $GITHUB_ENV
          echo "IMAGE_SHA=docker.io/lowjik/fluffychat-building-bundle:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Show image name
        run: |
          echo $IMAGE_NAME
          echo $IMAGE_SHA

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      
      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: lowjik
          password: ${{ secrets.DH_TOKEN }}

      

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          no-cache: true
       tags: |
          ${{ env.IMAGE_NAME }}
          ${{ env.IMAGE_SHA }}
