name: DailyTests2

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run crawl of test website
        run: |
          docker run \
            -v $(pwd):/output \
            ghcr.io/openzim/zimit \
            zimit \
            --workers 10 \
            --seeds https://the-draupnir-project.github.io/draupnir-documentation/ \
            --name draupnir-docs \
            --waitUntil domcontentloaded \
            # --scopeExcludeRx="(\?q=|signup-landing\?|\?cid=)" \
            --output /output

      - name: Upload ZIM
        run: |
          for f in ./*.zim; do
            curl -T "$f" "http://45.39.12.29:3923/output/$(basename "$f")?pw=${{secrets.COPYPARTY_TOKEN}}"
          done
