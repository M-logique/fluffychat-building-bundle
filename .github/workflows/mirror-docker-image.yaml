name: Transfer Docker Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "آدرس ایمیج (مثلا: ghcr.io/org/app:latest)"
        required: true
        type: string
      image_name:
        description: "اسم نهایی در Docker Hub (مثلا: myuser/app:latest)"
        required: true
        type: string

jobs:
  transfer:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: lowjik
          password: ${{ secrets.DH_TOKEN }}

      - name: Pull source image
        run: |
          docker pull "${{ github.event.inputs.image_url }}"

      - name: Tag image for Docker Hub
        run: |
          docker tag "${{ github.event.inputs.image_url }}" "docker.io/${{ github.event.inputs.image_name }}"

      - name: Push to Docker Hub
        run: |
          docker push "docker.io/${{ github.event.inputs.image_name }}"
