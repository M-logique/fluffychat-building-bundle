name: Upload

on:
  workflow_dispatch:


jobs:
  stream-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y coreutils curl

      - name: Stream upload ZIM
        run: |
            # URL="https://ftp.fau.de/kiwix/zim/wikipedia/wikipedia_en_all_maxi_2026-02.zim"
            URL="https://download.kiwix.org/zim/wikipedia/wikipedia_fa_all_maxi_2026-01.zim"
            BASE="wikipedia_en_all_maxi_2026-02.zim.part"

            curl -L "$URL" | split -b 50M -d - "$BASE-" \
            --filter='
                echo "Uploading $FILE"
                curl --retry 5 --retry-delay 5 -T - "https://matrix.hipoo.ir/fat/$FILE"
            '