name: Upload

on:
  workflow_dispatch:


jobs:
  stream-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y coreutils curl

      - name: Stream upload ZIM
        run: |
            URL="https://ftp.fau.de/kiwix/zim/wikipedia/wikipedia_en_all_maxi_2026-02.zim"
            BASE="wikipedia_en_all_maxi_2026-02.zim.part"

            curl -L "$URL" | split -b 100M -d - \
            --filter='
                name=$(printf "%s%04d" "'"$BASE"'" "$FILE")
                echo "Uploading $name"
                curl --retry 5 --retry-delay 5 -T - "https://matrix.hipoo.ir/fat/$name"
            '

